<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>추급권 계산기 — 추급권 정산 플랫폼</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen" data-page="calculator">
  <div id="nav"></div>

  <main class="max-w-7xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold text-slate-800 mb-6">추급권 계산기 <span class="text-sm font-normal text-slate-400">(A-01 + A-02)</span></h1>

    <div class="grid grid-cols-1 lg:grid-cols-5 gap-6">
      <!-- 입력 패널 -->
      <div class="lg:col-span-2">
        <div class="bg-white rounded-xl border p-6 sticky top-4">
          <h2 class="font-bold text-slate-700 mb-4">거래 정보 입력</h2>

          <!-- 작가 검색 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-600 mb-1">작가</label>
            <input id="artist-search" type="text" placeholder="작가명 검색..."
              class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-teal-500 focus:border-teal-500"
              oninput="onArtistSearch(this.value)">
            <div id="artist-results" class="mt-1 border rounded-lg bg-white shadow-lg hidden max-h-48 overflow-auto"></div>
            <div id="selected-artist" class="mt-2 hidden"></div>
          </div>

          <!-- 낙찰가 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-600 mb-1">낙찰가 (원)</label>
            <input id="sale-price" type="text" placeholder="50,000,000"
              class="w-full border rounded-lg px-3 py-2 text-lg font-bold focus:ring-2 focus:ring-teal-500 focus:border-teal-500"
              oninput="onPriceInput(this)">
            <div class="flex gap-2 mt-2 flex-wrap">
              <button onclick="setPrice(10000000)" class="px-3 py-1 bg-gray-100 rounded-full text-xs hover:bg-gray-200">1천만</button>
              <button onclick="setPrice(50000000)" class="px-3 py-1 bg-gray-100 rounded-full text-xs hover:bg-gray-200">5천만</button>
              <button onclick="setPrice(100000000)" class="px-3 py-1 bg-gray-100 rounded-full text-xs hover:bg-gray-200">1억</button>
              <button onclick="setPrice(500000000)" class="px-3 py-1 bg-gray-100 rounded-full text-xs hover:bg-gray-200">5억</button>
              <button onclick="setPrice(1000000000)" class="px-3 py-1 bg-gray-100 rounded-full text-xs hover:bg-gray-200">10억</button>
              <button onclick="setPrice(3000000000)" class="px-3 py-1 bg-gray-100 rounded-full text-xs hover:bg-gray-200">30억</button>
            </div>
          </div>

          <!-- 거래 유형 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-600 mb-1">거래 유형</label>
            <div class="flex gap-3">
              <label class="flex items-center gap-1.5">
                <input type="radio" name="saleType" value="재판매" checked onchange="recalculate()">
                <span class="text-sm">재판매</span>
              </label>
              <label class="flex items-center gap-1.5">
                <input type="radio" name="saleType" value="최초판매" onchange="recalculate()">
                <span class="text-sm">최초 판매</span>
              </label>
            </div>
          </div>

          <!-- 거래업자 관여 -->
          <div class="mb-4">
            <label class="block text-sm font-medium text-slate-600 mb-1">거래업자</label>
            <select id="buyer-type" class="w-full border rounded-lg px-3 py-2 text-sm" onchange="recalculate()">
              <option value="경매">경매사</option>
              <option value="갤러리">갤러리/딜러</option>
              <option value="개인">개인 간 거래</option>
            </select>
          </div>

          <button onclick="recalculate()" class="w-full bg-teal-600 text-white rounded-lg py-2.5 font-bold hover:bg-teal-700 transition">
            계산하기
          </button>
        </div>
      </div>

      <!-- 결과 패널 -->
      <div class="lg:col-span-3">
        <!-- 해당 여부 판별 (A-01) -->
        <div id="eligibility-result" class="bg-white rounded-xl border p-6 mb-6">
          <h2 class="font-bold text-slate-700 mb-4">추급권 해당 여부 판별 <span class="text-xs font-normal text-slate-400">(A-01)</span></h2>
          <p class="text-sm text-slate-400">낙찰가를 입력하고 [계산하기]를 클릭하세요.</p>
        </div>

        <!-- 계산 결과 (A-02) -->
        <div id="calculation-result" class="bg-white rounded-xl border p-6">
          <h2 class="font-bold text-slate-700 mb-4">추급권료 계산 결과 <span class="text-xs font-normal text-slate-400">(A-02)</span></h2>
          <p class="text-sm text-slate-400">판별 결과가 '적용'인 경우 자동 계산됩니다.</p>
        </div>
      </div>
    </div>
  </main>

  <script src="js/arr-engine.js"></script>
  <script src="js/app.js"></script>
  <script>
  let selectedArtist = null;

  function initPage() {}

  function onArtistSearch(query) {
    const container = document.getElementById('artist-results');
    if (query.length < 1) { container.classList.add('hidden'); return; }
    const results = searchArtists(query);
    if (results.length === 0) { container.classList.add('hidden'); return; }
    container.classList.remove('hidden');
    container.innerHTML = results.map(a => {
      const cs = getCopyrightStatus(a);
      return `<div class="px-3 py-2 hover:bg-teal-50 cursor-pointer border-b last:border-0 flex items-center justify-between"
                   onclick="selectArtist(${a.id})">
        <div>
          <span class="font-medium text-sm">${a.name}</span>
          <span class="text-xs text-slate-400 ml-1">${a.nameEn}</span>
        </div>
        <span class="text-xs px-2 py-0.5 rounded-full ${cs.color === 'green' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${cs.label}</span>
      </div>`;
    }).join('');
  }

  function selectArtist(id) {
    selectedArtist = getArtistById(id);
    document.getElementById('artist-results').classList.add('hidden');
    document.getElementById('artist-search').value = selectedArtist.name;
    const cs = getCopyrightStatus(selectedArtist);
    document.getElementById('selected-artist').classList.remove('hidden');
    document.getElementById('selected-artist').innerHTML = `
      <div class="flex items-center gap-2 p-2 bg-gray-50 rounded-lg text-sm">
        <span class="font-medium">${selectedArtist.name}</span>
        <span class="text-slate-400">${selectedArtist.nameEn}</span>
        <span class="ml-auto text-xs px-2 py-0.5 rounded-full ${cs.color === 'green' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${cs.label}</span>
      </div>`;
    recalculate();
  }

  function setPrice(price) {
    document.getElementById('sale-price').value = formatNumber(price);
    recalculate();
  }

  function onPriceInput(el) {
    const num = parseInt(el.value.replace(/[^0-9]/g, ''));
    if (!isNaN(num)) el.value = formatNumber(num);
    recalculate();
  }

  function getInputPrice() {
    return parseInt(document.getElementById('sale-price').value.replace(/[^0-9]/g, '')) || 0;
  }

  function recalculate() {
    const price = getInputPrice();
    if (price === 0) return;

    const isFirstSale = document.querySelector('input[name="saleType"]:checked').value === '최초판매';
    const buyerType = document.getElementById('buyer-type').value;

    const tx = { isFirstSale, buyerType, salePrice: price };
    const eligibility = checkEligibility(tx, selectedArtist);

    // 판별 결과 표시
    document.getElementById('eligibility-result').innerHTML = `
      <h2 class="font-bold text-slate-700 mb-4">추급권 해당 여부 판별 <span class="text-xs font-normal text-slate-400">(A-01)</span></h2>
      <div class="mb-4 flex items-center gap-3">
        <div class="text-3xl">${eligibility.eligible ? '✅' : '❌'}</div>
        <div>
          <div class="text-lg font-bold ${eligibility.eligible ? 'text-green-600' : 'text-red-600'}">
            ${eligibility.eligible ? '추급권 적용 대상' : '추급권 미적용'}
          </div>
          ${!eligibility.eligible ? `<div class="text-sm text-slate-500">${eligibility.checks.find(c => !c.pass)?.reason || ''}</div>` : ''}
        </div>
      </div>
      <div class="space-y-2">
        ${eligibility.checks.map(c => `
          <div class="flex items-center gap-3 text-sm py-1.5 border-b border-dashed last:border-0">
            <span class="text-lg">${c.pass ? '✓' : '✗'}</span>
            <span class="font-medium w-40 text-slate-700">${c.label}</span>
            <span class="${c.pass ? 'text-green-600' : 'text-red-600'}">${c.reason}</span>
          </div>
        `).join('')}
      </div>`;

    // 계산 결과
    if (eligibility.eligible) {
      const result = calculateRoyalty(price);
      const bpRate = ARR_SETTINGS.buyerPremiumRate;
      const bp = Math.round(price * bpRate);

      document.getElementById('calculation-result').innerHTML = `
        <h2 class="font-bold text-slate-700 mb-4">추급권료 계산 결과 <span class="text-xs font-normal text-slate-400">(A-02)</span></h2>

        <!-- 요약 -->
        <div class="grid grid-cols-3 gap-4 mb-6">
          ${statCard('추급권료', formatKRW(result.totalRoyalty), `낙찰가 대비 ${result.effectiveRate}%`, 'teal')}
          ${statCard('낙찰가', formatKRW(price), '', 'blue')}
          ${statCard('구매자 총 부담', formatKRW(price + bp + result.totalRoyalty), `낙찰가+BP+ARR`, 'purple')}
        </div>

        <!-- 구간별 계산 상세 -->
        <div class="bg-gray-50 rounded-lg p-4 mb-4">
          <h3 class="font-medium text-sm text-slate-600 mb-3">구간별 계산 상세</h3>
          <table class="w-full text-sm">
            <thead>
              <tr class="text-slate-500">
                <th class="text-left py-1">구간</th>
                <th class="text-right py-1">비율</th>
                <th class="text-right py-1">과세 기준</th>
                <th class="text-right py-1">추급권료</th>
              </tr>
            </thead>
            <tbody>
              ${result.details.map(d => `
                <tr class="border-t">
                  <td class="py-2 text-slate-700">${d.label}</td>
                  <td class="py-2 text-right">${d.ratePercent}</td>
                  <td class="py-2 text-right text-slate-600">${formatKRW(d.base)}</td>
                  <td class="py-2 text-right font-medium text-teal-600">${formatKRW(Math.round(d.amount))}</td>
                </tr>
              `).join('')}
              <tr class="border-t-2 border-slate-300 font-bold">
                <td class="py-2" colspan="3">합계</td>
                <td class="py-2 text-right text-teal-700 text-base">${formatKRW(result.totalRoyalty)}</td>
              </tr>
            </tbody>
          </table>
          ${result.capped ? '<p class="text-xs text-amber-600 mt-2">* 상한 적용됨</p>' : ''}
        </div>

        <!-- 인보이스 미리보기 -->
        <div class="bg-white border-2 border-dashed rounded-lg p-4">
          <h3 class="font-medium text-sm text-slate-600 mb-3">인보이스 미리보기 (A-03)</h3>
          <table class="w-full text-sm">
            <tr class="border-b"><td class="py-2 text-slate-600">낙찰가</td><td class="py-2 text-right">₩ ${formatNumber(price)}</td></tr>
            <tr class="border-b"><td class="py-2 text-slate-600">바이어 프리미엄 (${(bpRate*100)}%)</td><td class="py-2 text-right">₩ ${formatNumber(bp)}</td></tr>
            <tr class="border-b bg-teal-50"><td class="py-2 text-teal-700 font-medium">추급권료 (${result.effectiveRate}%)</td><td class="py-2 text-right text-teal-700 font-medium">₩ ${formatNumber(result.totalRoyalty)}</td></tr>
            <tr class="font-bold text-base"><td class="py-3">합계</td><td class="py-3 text-right">₩ ${formatNumber(price + bp + result.totalRoyalty)}</td></tr>
          </table>
          <p class="text-xs text-slate-400 mt-2">* 추급권료는 저작권법 제14조의2에 따라 저작권단체에 납부됩니다.</p>
        </div>
      `;
    } else {
      document.getElementById('calculation-result').innerHTML = `
        <h2 class="font-bold text-slate-700 mb-4">추급권료 계산 결과 <span class="text-xs font-normal text-slate-400">(A-02)</span></h2>
        <div class="text-center py-8 text-slate-400">
          <div class="text-4xl mb-2">—</div>
          <p>추급권 미적용 대상이므로 계산하지 않습니다.</p>
        </div>`;
    }
  }
  </script>
</body>
</html>
