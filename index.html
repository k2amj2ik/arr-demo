<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>대시보드 — 추급권 정산 플랫폼</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-50 min-h-screen" data-page="index">
  <div id="nav"></div>

  <main class="max-w-7xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold text-slate-800 mb-6">대시보드</h1>

    <!-- 통계 카드 -->
    <div id="stat-cards" class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8"></div>

    <!-- 차트 + 최근 거래 -->
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
      <!-- 차트 -->
      <div class="lg:col-span-2 bg-white rounded-xl border p-6">
        <h2 class="font-bold text-slate-700 mb-4">금액 구간별 거래 분포</h2>
        <canvas id="priceChart" height="200"></canvas>
      </div>
      <!-- 신고 현황 -->
      <div class="bg-white rounded-xl border p-6">
        <h2 class="font-bold text-slate-700 mb-4">신고 현황</h2>
        <canvas id="statusChart" height="200"></canvas>
      </div>
    </div>

    <!-- 최근 거래 목록 -->
    <div class="bg-white rounded-xl border overflow-hidden">
      <div class="px-6 py-4 border-b flex items-center justify-between">
        <h2 class="font-bold text-slate-700">최근 거래 (추급권 적용 대상)</h2>
        <a href="transactions.html" class="text-sm text-teal-600 hover:underline">전체 보기 →</a>
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left font-medium text-slate-500">거래일</th>
              <th class="px-4 py-3 text-left font-medium text-slate-500">작가</th>
              <th class="px-4 py-3 text-left font-medium text-slate-500">작품</th>
              <th class="px-4 py-3 text-right font-medium text-slate-500">낙찰가</th>
              <th class="px-4 py-3 text-right font-medium text-slate-500">추급권료</th>
              <th class="px-4 py-3 text-center font-medium text-slate-500">상태</th>
            </tr>
          </thead>
          <tbody id="recent-table" class="divide-y"></tbody>
        </table>
      </div>
    </div>

    <!-- 빠른 이동 -->
    <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mt-8">
      <a href="calculator.html" class="bg-white rounded-xl border p-5 hover:shadow-md transition group">
        <div class="text-2xl mb-2">🧮</div>
        <div class="font-bold text-slate-700 group-hover:text-teal-600">비용 계산기</div>
        <div class="text-xs text-slate-400 mt-1">낙찰가 입력 → 추급권료 자동 계산</div>
      </a>
      <a href="transactions.html" class="bg-white rounded-xl border p-5 hover:shadow-md transition group">
        <div class="text-2xl mb-2">📋</div>
        <div class="font-bold text-slate-700 group-hover:text-teal-600">거래 관리</div>
        <div class="text-xs text-slate-400 mt-1">거래 목록, 인보이스, 신고서</div>
      </a>
      <a href="consignment.html" class="bg-white rounded-xl border p-5 hover:shadow-md transition group">
        <div class="text-2xl mb-2">📝</div>
        <div class="font-bold text-slate-700 group-hover:text-teal-600">위탁 안내</div>
        <div class="text-xs text-slate-400 mt-1">출품자용 추급권료 시뮬레이션</div>
      </a>
      <a href="artists.html" class="bg-white rounded-xl border p-5 hover:shadow-md transition group">
        <div class="text-2xl mb-2">🎨</div>
        <div class="font-bold text-slate-700 group-hover:text-teal-600">작가 DB</div>
        <div class="text-xs text-slate-400 mt-1">작가 검색, 저작권 존속 확인</div>
      </a>
    </div>
  </main>

  <script src="js/arr-engine.js"></script>
  <script src="js/app.js"></script>
  <script>
  function initPage() {
    const txs = enrichTransactions();
    const eligible = txs.filter(t => t.eligibility.eligible);
    const totalRoyalty = eligible.reduce((sum, t) => sum + t.royalty.totalRoyalty, 0);
    const paid = eligible.filter(t => t.reportStatus === '납부완료');
    const unreported = eligible.filter(t => t.reportStatus === '미신고');

    // 통계 카드
    document.getElementById('stat-cards').innerHTML = [
      statCard('총 거래 건수', `${TRANSACTIONS_DATA.length}건`, `추급권 적용 ${eligible.length}건`, 'teal'),
      statCard('추급권료 총액', formatKRW(totalRoyalty), `평균 ${formatKRW(Math.round(totalRoyalty / (eligible.length || 1)))}/건`, 'blue'),
      statCard('납부 완료', `${paid.length}건`, `${eligible.length > 0 ? Math.round(paid.length / eligible.length * 100) : 0}% 완료`, 'green'),
      statCard('미신고', `${unreported.length}건`, '신고 필요', unreported.length > 0 ? 'amber' : 'green')
    ].join('');

    // 최근 거래 테이블 (상위 10건)
    const recent = eligible.sort((a, b) => b.saleDate.localeCompare(a.saleDate)).slice(0, 10);
    document.getElementById('recent-table').innerHTML = recent.map(t => `
      <tr class="hover:bg-gray-50">
        <td class="px-4 py-3 text-slate-600">${t.saleDate}</td>
        <td class="px-4 py-3 font-medium text-slate-800">${t.artistName}</td>
        <td class="px-4 py-3 text-slate-600 max-w-[200px] truncate">${t.title}</td>
        <td class="px-4 py-3 text-right font-medium">${formatKRW(t.salePrice)}</td>
        <td class="px-4 py-3 text-right text-teal-600 font-medium">${formatKRW(t.royalty.totalRoyalty)}</td>
        <td class="px-4 py-3 text-center">${statusBadge(t.reportStatus)}</td>
      </tr>
    `).join('');

    // 금액 구간 차트
    const priceRanges = [
      { label: '~1천만', min: 0, max: 10000000 },
      { label: '1천만~5천만', min: 10000000, max: 50000000 },
      { label: '5천만~1억', min: 50000000, max: 100000000 },
      { label: '1억~5억', min: 100000000, max: 500000000 },
      { label: '5억~10억', min: 500000000, max: 1000000000 },
      { label: '10억~', min: 1000000000, max: Infinity }
    ];
    const priceCounts = priceRanges.map(r => eligible.filter(t => t.salePrice >= r.min && t.salePrice < r.max).length);
    new Chart(document.getElementById('priceChart'), {
      type: 'bar',
      data: {
        labels: priceRanges.map(r => r.label),
        datasets: [{ label: '거래 건수', data: priceCounts, backgroundColor: '#14b8a6' }]
      },
      options: { responsive: true, plugins: { legend: { display: false } } }
    });

    // 신고 현황 차트
    const statuses = ['납부완료', '신고완료', '미신고'];
    const statusCounts = statuses.map(s => eligible.filter(t => t.reportStatus === s).length);
    new Chart(document.getElementById('statusChart'), {
      type: 'doughnut',
      data: {
        labels: statuses,
        datasets: [{ data: statusCounts, backgroundColor: ['#22c55e', '#3b82f6', '#f59e0b'] }]
      },
      options: { responsive: true }
    });
  }
  </script>
</body>
</html>
