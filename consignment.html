<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>위탁 안내 — 추급권 정산 플랫폼</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body class="bg-gray-50 min-h-screen" data-page="consignment">
  <div id="nav"></div>
  <main class="max-w-7xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold text-slate-800 mb-6">위탁자 사전 안내 <span class="text-sm font-normal text-slate-400">(A-05)</span></h1>

    <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
      <!-- 입력 -->
      <div class="bg-white rounded-xl border p-6">
        <h2 class="font-bold text-slate-700 mb-4">위탁 작품 정보</h2>
        <div class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-slate-600 mb-1">작가</label>
            <select id="c-artist" class="w-full border rounded-lg px-3 py-2 text-sm" onchange="simulate()">
              <option value="">작가 선택...</option>
            </select>
          </div>
          <div>
            <label class="block text-sm font-medium text-slate-600 mb-1">작품명</label>
            <input id="c-title" type="text" placeholder="작품명 입력" class="w-full border rounded-lg px-3 py-2 text-sm">
          </div>
          <div class="grid grid-cols-3 gap-3">
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">저가 예상</label>
              <input id="c-low" type="text" placeholder="3,000만" class="w-full border rounded-lg px-3 py-2 text-sm" oninput="formatPriceInput(this)" value="30,000,000">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">중가 예상</label>
              <input id="c-mid" type="text" placeholder="5,000만" class="w-full border rounded-lg px-3 py-2 text-sm" oninput="formatPriceInput(this)" value="50,000,000">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">고가 예상</label>
              <input id="c-high" type="text" placeholder="1억" class="w-full border rounded-lg px-3 py-2 text-sm" oninput="formatPriceInput(this)" value="100,000,000">
            </div>
          </div>
          <button onclick="simulate()" class="w-full bg-teal-600 text-white rounded-lg py-2.5 font-bold hover:bg-teal-700">시뮬레이션</button>
        </div>
      </div>

      <!-- 결과 -->
      <div id="sim-result" class="bg-white rounded-xl border p-6">
        <h2 class="font-bold text-slate-700 mb-4">추급권료 예상 금액</h2>
        <p class="text-sm text-slate-400">작가와 예상 낙찰가를 입력하고 시뮬레이션을 클릭하세요.</p>
      </div>
    </div>

    <!-- 안내문 미리보기 -->
    <div id="notice-area" class="mt-6 hidden">
      <div class="flex items-center justify-between mb-3">
        <h2 class="font-bold text-slate-700">위탁자 안내문 미리보기</h2>
        <button onclick="generatePDF('notice-pdf','위탁자_추급권_안내문.pdf')" class="px-4 py-2 bg-teal-600 text-white rounded-lg text-sm hover:bg-teal-700">PDF 다운로드</button>
      </div>
      <div id="notice-pdf" class="bg-white rounded-xl border p-8"></div>
    </div>
  </main>

  <script src="js/arr-engine.js"></script>
  <script src="js/app.js"></script>
  <script>
  function initPage() {
    const sel = document.getElementById('c-artist');
    ARTISTS_DATA.forEach(a => {
      const cs = getCopyrightStatus(a);
      const opt = document.createElement('option');
      opt.value = a.id;
      opt.textContent = `${a.name} (${a.nameEn}) — ${cs.label}`;
      sel.appendChild(opt);
    });
  }

  function parsePrice(el) { return parseInt(el.value.replace(/[^0-9]/g, '')) || 0; }
  function formatPriceInput(el) {
    const n = parseInt(el.value.replace(/[^0-9]/g, ''));
    if (!isNaN(n)) el.value = formatNumber(n);
  }

  function simulate() {
    const artistId = parseInt(document.getElementById('c-artist').value);
    const low = parsePrice(document.getElementById('c-low'));
    const mid = parsePrice(document.getElementById('c-mid'));
    const high = parsePrice(document.getElementById('c-high'));
    if (!artistId || !low || !mid || !high) return;

    const artist = getArtistById(artistId);
    const scenarios = simulateConsignment(artistId, low, mid, high);
    const cs = getCopyrightStatus(artist);

    document.getElementById('sim-result').innerHTML = `
      <h2 class="font-bold text-slate-700 mb-4">추급권료 예상 금액</h2>
      <div class="mb-4 flex items-center gap-2">
        <span class="font-medium">${artist.name}</span>
        <span class="text-xs px-2 py-0.5 rounded-full ${cs.color === 'green' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">${cs.label}</span>
      </div>
      ${cs.status === '만료' ? '<div class="p-3 bg-amber-50 border border-amber-200 rounded-lg text-sm text-amber-700 mb-4">저작재산권이 만료되어 추급권이 적용되지 않습니다.</div>' : ''}
      <div class="space-y-3">
        ${scenarios.map(s => `
          <div class="p-4 rounded-lg border ${s.eligible ? 'bg-white' : 'bg-gray-50'}">
            <div class="flex items-center justify-between mb-2">
              <span class="text-sm font-medium text-slate-600">${s.label}</span>
              ${eligibilityBadge(s.eligible)}
            </div>
            <div class="flex items-baseline justify-between">
              <span class="text-lg font-bold">${formatKRW(s.price)}</span>
              <span class="text-lg font-bold ${s.eligible ? 'text-teal-600' : 'text-slate-300'}">${s.eligible ? formatKRW(s.royalty) : '—'}</span>
            </div>
            ${s.eligible ? `<div class="text-xs text-slate-400 mt-1">낙찰가 대비 ${s.effectiveRate}%</div>` : ''}
          </div>
        `).join('')}
      </div>`;

    // 안내문
    if (cs.status !== '만료') {
      const title = document.getElementById('c-title').value || '(작품명 미입력)';
      document.getElementById('notice-area').classList.remove('hidden');
      document.getElementById('notice-pdf').innerHTML = `
        <div style="font-family: sans-serif;">
          <div class="text-center mb-6">
            <div class="text-xs text-slate-400 mb-1">Seoul Auction Blue</div>
            <div class="text-xl font-bold text-slate-800">추급권료 안내문</div>
          </div>
          <p class="text-sm text-slate-600 mb-4">안녕하세요. 출품해 주신 작품에 대한 추급권료 안내드립니다.</p>
          <div class="mb-4 p-4 bg-gray-50 rounded-lg text-sm">
            <div><strong>작가:</strong> ${artist.name} (${artist.nameEn})</div>
            <div><strong>작품:</strong> ${title}</div>
          </div>
          <h3 class="font-bold text-sm mb-2">예상 추급권료</h3>
          <table class="w-full text-sm border mb-4">
            <thead class="bg-gray-50"><tr>
              <th class="p-2 border text-left">시나리오</th>
              <th class="p-2 border text-right">예상 낙찰가</th>
              <th class="p-2 border text-right">예상 추급권료</th>
              <th class="p-2 border text-right">비율</th>
            </tr></thead>
            <tbody>
              ${scenarios.filter(s => s.eligible).map(s => `
                <tr><td class="p-2 border">${s.label}</td>
                <td class="p-2 border text-right">${formatKRW(s.price)}</td>
                <td class="p-2 border text-right font-medium text-teal-700">${formatKRW(s.royalty)}</td>
                <td class="p-2 border text-right">${s.effectiveRate}%</td></tr>
              `).join('')}
            </tbody>
          </table>
          <div class="text-xs text-slate-400 border-t pt-3 space-y-1">
            <p>* 추급권료는 낙찰대금에서 공제되어 저작권단체를 통해 작가에게 지급됩니다.</p>
            <p>* 법적 근거: 저작권법 제14조의2 (2027년 10월 23일 시행)</p>
            <p>* 위 금액은 시행령 확정 전 참고용 추정치이며, 실제 비율은 변경될 수 있습니다.</p>
          </div>
        </div>`;
    } else {
      document.getElementById('notice-area').classList.add('hidden');
    }
  }
  </script>
</body>
</html>
