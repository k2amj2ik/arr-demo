<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>관리자 설정 — 추급권 정산 플랫폼</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen" data-page="settings">
  <div id="nav"></div>
  <main class="max-w-7xl mx-auto px-4 py-6">
    <h1 class="text-2xl font-bold text-slate-800 mb-6">관리자 설정 <span class="text-sm font-normal text-slate-400">(A-08)</span></h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      <!-- 비율 설정 -->
      <div class="lg:col-span-2">
        <div class="bg-white rounded-xl border p-6 mb-6">
          <div class="flex items-center justify-between mb-4">
            <h2 class="font-bold text-slate-700">추급권료 비율 구간 설정</h2>
            <button onclick="addBracket()" class="px-3 py-1.5 bg-teal-600 text-white rounded-lg text-sm hover:bg-teal-700">+ 구간 추가</button>
          </div>
          <div class="bg-amber-50 border border-amber-200 rounded-lg p-3 mb-4 text-sm text-amber-700">
            시행령 미확정 — 아래 비율은 EU 기준을 참고한 참고용입니다. 시행령 확정 시 수정하세요.
          </div>
          <table class="w-full text-sm" id="brackets-table">
            <thead class="bg-gray-50">
              <tr>
                <th class="p-3 text-left font-medium text-slate-500">#</th>
                <th class="p-3 text-left font-medium text-slate-500">구간 하한 (원)</th>
                <th class="p-3 text-left font-medium text-slate-500">구간 상한 (원)</th>
                <th class="p-3 text-left font-medium text-slate-500">비율 (%)</th>
                <th class="p-3 text-left font-medium text-slate-500">라벨</th>
                <th class="p-3 text-center font-medium text-slate-500">삭제</th>
              </tr>
            </thead>
            <tbody id="brackets-body"></tbody>
          </table>
        </div>

        <!-- 기타 설정 -->
        <div class="bg-white rounded-xl border p-6">
          <h2 class="font-bold text-slate-700 mb-4">기타 설정</h2>
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">최소 적용 금액 (원)</label>
              <input id="s-minprice" type="text" class="w-full border rounded-lg px-3 py-2 text-sm" oninput="formatSettingInput(this)">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">추급권료 상한 (원, 0=무제한)</label>
              <input id="s-maxroyalty" type="text" class="w-full border rounded-lg px-3 py-2 text-sm" oninput="formatSettingInput(this)">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">바이어 프리미엄 비율 (%)</label>
              <input id="s-bprate" type="number" step="0.01" class="w-full border rounded-lg px-3 py-2 text-sm">
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-600 mb-1">저작권 존속 기간 (사후 년)</label>
              <input id="s-duration" type="number" class="w-full border rounded-lg px-3 py-2 text-sm">
            </div>
          </div>
          <button onclick="saveSettings()" class="mt-4 px-6 py-2.5 bg-teal-600 text-white rounded-lg font-bold hover:bg-teal-700">설정 저장</button>
          <span id="save-msg" class="ml-3 text-sm text-green-600 hidden">저장되었습니다 ✓</span>
        </div>
      </div>

      <!-- 변경 이력 -->
      <div>
        <div class="bg-white rounded-xl border p-6">
          <h2 class="font-bold text-slate-700 mb-4">변경 이력</h2>
          <div id="change-log" class="space-y-3 text-sm"></div>
        </div>

        <!-- 실시간 테스트 -->
        <div class="bg-white rounded-xl border p-6 mt-6">
          <h2 class="font-bold text-slate-700 mb-4">실시간 계산 테스트</h2>
          <div>
            <label class="block text-xs text-slate-500 mb-1">테스트 낙찰가</label>
            <input id="test-price" type="text" placeholder="50,000,000" class="w-full border rounded-lg px-3 py-2 text-sm mb-2" oninput="testCalc(this)">
          </div>
          <div id="test-result" class="text-sm text-slate-500">금액을 입력하세요</div>
        </div>
      </div>
    </div>
  </main>

  <script src="js/arr-engine.js"></script>
  <script src="js/app.js"></script>
  <script>
  function initPage() {
    renderBrackets();
    renderOtherSettings();
    renderChangeLog();
  }

  function renderBrackets() {
    const brackets = ARR_SETTINGS.rateBrackets;
    document.getElementById('brackets-body').innerHTML = brackets.map((b, i) => `
      <tr class="border-t">
        <td class="p-2 text-slate-400">${i + 1}</td>
        <td class="p-2"><input type="text" value="${formatNumber(b.min)}" data-idx="${i}" data-field="min" class="border rounded px-2 py-1 text-sm w-full" onchange="updateBracket(this)"></td>
        <td class="p-2"><input type="text" value="${b.max !== null ? formatNumber(b.max) : '무제한'}" data-idx="${i}" data-field="max" class="border rounded px-2 py-1 text-sm w-full" onchange="updateBracket(this)"></td>
        <td class="p-2"><input type="number" value="${(b.rate * 100).toFixed(2)}" data-idx="${i}" data-field="rate" step="0.01" class="border rounded px-2 py-1 text-sm w-24" onchange="updateBracket(this)"></td>
        <td class="p-2"><input type="text" value="${b.label}" data-idx="${i}" data-field="label" class="border rounded px-2 py-1 text-sm w-full" onchange="updateBracket(this)"></td>
        <td class="p-2 text-center"><button onclick="removeBracket(${i})" class="text-red-400 hover:text-red-600">✕</button></td>
      </tr>
    `).join('');
  }

  function renderOtherSettings() {
    document.getElementById('s-minprice').value = formatNumber(ARR_SETTINGS.minimumPrice || 0);
    document.getElementById('s-maxroyalty').value = ARR_SETTINGS.maximumRoyalty ? formatNumber(ARR_SETTINGS.maximumRoyalty) : '0';
    document.getElementById('s-bprate').value = ((ARR_SETTINGS.buyerPremiumRate || 0.15) * 100).toFixed(1);
    document.getElementById('s-duration').value = ARR_SETTINGS.copyrightDuration || 70;
  }

  function renderChangeLog() {
    const log = ARR_SETTINGS.changeLog || [];
    document.getElementById('change-log').innerHTML = log.length
      ? log.map(l => `
          <div class="p-3 bg-gray-50 rounded-lg">
            <div class="font-medium text-slate-700">${l.date}</div>
            <div class="text-slate-500 text-xs mt-0.5">${l.change}</div>
            <div class="text-slate-400 text-xs">${l.by}</div>
          </div>
        `).join('')
      : '<p class="text-slate-400">변경 이력 없음</p>';
  }

  function updateBracket(el) {
    const i = parseInt(el.dataset.idx);
    const field = el.dataset.field;
    if (field === 'min') ARR_SETTINGS.rateBrackets[i].min = parseInt(el.value.replace(/[^0-9]/g, '')) || 0;
    else if (field === 'max') {
      const v = el.value.replace(/[^0-9]/g, '');
      ARR_SETTINGS.rateBrackets[i].max = v === '' || el.value === '무제한' ? null : parseInt(v);
    }
    else if (field === 'rate') ARR_SETTINGS.rateBrackets[i].rate = parseFloat(el.value) / 100;
    else if (field === 'label') ARR_SETTINGS.rateBrackets[i].label = el.value;
  }

  function addBracket() {
    const last = ARR_SETTINGS.rateBrackets[ARR_SETTINGS.rateBrackets.length - 1];
    ARR_SETTINGS.rateBrackets.push({ min: last ? (last.max || 0) : 0, max: null, rate: 0.01, label: '새 구간' });
    renderBrackets();
  }

  function removeBracket(i) {
    if (ARR_SETTINGS.rateBrackets.length <= 1) return;
    ARR_SETTINGS.rateBrackets.splice(i, 1);
    renderBrackets();
  }

  function formatSettingInput(el) {
    const n = parseInt(el.value.replace(/[^0-9]/g, ''));
    if (!isNaN(n)) el.value = formatNumber(n);
  }

  function saveSettings() {
    ARR_SETTINGS.minimumPrice = parseInt(document.getElementById('s-minprice').value.replace(/[^0-9]/g, '')) || 0;
    const maxVal = parseInt(document.getElementById('s-maxroyalty').value.replace(/[^0-9]/g, '')) || 0;
    ARR_SETTINGS.maximumRoyalty = maxVal > 0 ? maxVal : null;
    ARR_SETTINGS.buyerPremiumRate = parseFloat(document.getElementById('s-bprate').value) / 100;
    ARR_SETTINGS.copyrightDuration = parseInt(document.getElementById('s-duration').value) || 70;

    ARR_SETTINGS.changeLog.push({
      date: new Date().toISOString().slice(0, 10),
      change: '관리자 설정 변경 (데모)',
      by: '시스템 관리자'
    });

    renderChangeLog();
    const msg = document.getElementById('save-msg');
    msg.classList.remove('hidden');
    setTimeout(() => msg.classList.add('hidden'), 2000);
  }

  function testCalc(el) {
    const price = parseInt(el.value.replace(/[^0-9]/g, '')) || 0;
    if (price === 0) { document.getElementById('test-result').textContent = '금액을 입력하세요'; return; }
    el.value = formatNumber(price);
    const result = calculateRoyalty(price);
    document.getElementById('test-result').innerHTML = `
      <div class="p-3 bg-teal-50 rounded-lg">
        <div class="font-bold text-teal-700 text-lg">${formatKRW(result.totalRoyalty)}</div>
        <div class="text-xs text-teal-600">낙찰가 ${formatKRW(price)} 대비 ${result.effectiveRate}%</div>
      </div>`;
  }
  </script>
</body>
</html>
